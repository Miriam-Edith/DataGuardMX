<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DataGuardMX — Recuperar Contraseña</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--ink);
      margin: 0;
      padding: 20px;
    }
    .recovery-card {
      width: 100%;
      max-width: 400px;
      background: var(--panel);
      border: 1px solid var(--edge);
      border-radius: 16px;
      padding: 2rem;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
    }
    .back-link:hover { color: var(--teal); }
    .success-message {
      background: rgba(46,204,113,.1);
      border: 1px solid var(--green);
      border-radius: 8px;
      padding: 15px;
      color: var(--green);
      margin: 15px 0;
    }
    .error-message {
      background: rgba(231,76,60,.1);
      border: 1px solid var(--red);
      border-radius: 8px;
      padding: 15px;
      color: var(--red);
      margin: 15px 0;
    }
    .field { margin-bottom: 1.5rem; }
    .field label {
      display: block;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
      font-weight: 500;
    }
    .field input {
      width: 100%;
      background: var(--deep);
      border: 1px solid var(--edge);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: var(--bright);
      font-family: var(--sans);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: var(--teal); }
    .btn-primary {
      width: 100%;
      padding: 0.75rem;
      background: var(--teal);
      color: var(--ink);
      border: none;
      border-radius: 8px;
      font-family: var(--mono);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: var(--teal2); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="recovery-card">
    <div style="text-align: center; margin-bottom: 2rem;">
      <i class="fas fa-shield-alt" style="font-size: 3rem; color: var(--teal);"></i>
      <h2 style="color: var(--bright); margin-top: 1rem; font-family: var(--mono);">Recuperar Contraseña</h2>
      <p style="color: var(--muted); font-size: 0.85rem;">Te enviaremos un enlace a tu correo</p>
    </div>
    
    <form id="forgotForm">
      <div class="field">
        <label>Correo electrónico</label>
        <input type="email" id="forgotEmail" required placeholder="ejemplo@correo.com">
      </div>
      <button type="submit" class="btn-primary">ENVIAR ENLACE →</button>
    </form>
    
    <div id="message"></div>
    
    <a href="index.html" class="back-link">← Volver al inicio de sesión</a>
  </div>

  <script>
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('forgotEmail').value;
      const btn = e.target.querySelector('button');
      const msgDiv = document.getElementById('message');
      
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enviando...';
      btn.disabled = true;
      
      try {
        const response = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        
        const data = await response.json();
        
        msgDiv.className = 'success-message';
        msgDiv.innerHTML = `✅ ${data.message}`;
        document.getElementById('forgotForm').reset();
      } catch (error) {
        msgDiv.className = 'error-message';
        msgDiv.innerHTML = `❌ Error: ${error.message}`;
      } finally {
        btn.innerHTML = 'ENVIAR ENLACE →';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
