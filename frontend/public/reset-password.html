<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DataGuardMX — Nueva Contraseña</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--ink);
      margin: 0;
      padding: 20px;
    }
    .reset-card {
      width: 100%;
      max-width: 400px;
      background: var(--panel);
      border: 1px solid var(--edge);
      border-radius: 16px;
      padding: 2rem;
    }
    .success-message {
      background: rgba(46,204,113,.1);
      border: 1px solid var(--green);
      border-radius: 8px;
      padding: 15px;
      color: var(--green);
      margin: 15px 0;
    }
    .error-message {
      background: rgba(231,76,60,.1);
      border: 1px solid var(--red);
      border-radius: 8px;
      padding: 15px;
      color: var(--red);
      margin: 15px 0;
    }
    .field { margin-bottom: 1.5rem; }
    .field label {
      display: block;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
      font-weight: 500;
    }
    .field input {
      width: 100%;
      background: var(--deep);
      border: 1px solid var(--edge);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: var(--bright);
      font-family: var(--sans);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: var(--teal); }
    .btn-primary {
      width: 100%;
      padding: 0.75rem;
      background: var(--teal);
      color: var(--ink);
      border: none;
      border-radius: 8px;
      font-family: var(--mono);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: var(--teal2); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
    }
    .back-link:hover { color: var(--teal); }
  </style>
</head>
<body>
  <div class="reset-card">
    <div style="text-align: center; margin-bottom: 2rem;">
      <i class="fas fa-lock" style="font-size: 3rem; color: var(--teal);"></i>
      <h2 style="color: var(--bright); margin-top: 1rem; font-family: var(--mono);">Nueva Contraseña</h2>
    </div>
    
    <div id="tokenValid" style="display: none;">
      <form id="resetForm">
        <div class="field">
          <label>Nueva contraseña</label>
          <input type="password" id="newPassword" required minlength="6" placeholder="••••••••">
        </div>
        <div class="field">
          <label>Confirmar contraseña</label>
          <input type="password" id="confirmPassword" required minlength="6" placeholder="••••••••">
        </div>
        <button type="submit" class="btn-primary">CAMBIAR CONTRASEÑA →</button>
      </form>
    </div>
    
    <div id="message"></div>
    
    <a href="index.html" class="back-link">← Volver al inicio de sesión</a>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    const msgDiv = document.getElementById('message');
    const tokenValidDiv = document.getElementById('tokenValid');
    
    (async () => {
      if (!token) {
        msgDiv.className = 'error-message';
        msgDiv.innerHTML = '❌ Token no proporcionado';
        return;
      }
      
      try {
        const response = await fetch(`/api/auth/verify-reset-token/${token}`);
        const data = await response.json();
        
        if (data.valid) {
          tokenValidDiv.style.display = 'block';
          msgDiv.className = 'success-message';
          msgDiv.innerHTML = `✅ Token válido para: ${data.email}`;
        } else {
          msgDiv.className = 'error-message';
          msgDiv.innerHTML = '❌ Token inválido o expirado';
        }
      } catch (error) {
        msgDiv.className = 'error-message';
        msgDiv.innerHTML = '❌ Error al verificar token';
      }
    })();
    
    document.getElementById('resetForm')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const password = document.getElementById('newPassword').value;
      const confirm = document.getElementById('confirmPassword').value;
      
      if (password !== confirm) {
        msgDiv.className = 'error-message';
        msgDiv.innerHTML = '❌ Las contraseñas no coinciden';
        return;
      }
      
      if (password.length < 6) {
        msgDiv.className = 'error-message';
        msgDiv.innerHTML = '❌ La contraseña debe tener al menos 6 caracteres';
        return;
      }
      
      const btn = e.target.querySelector('button');
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Cambiando...';
      btn.disabled = true;
      
      try {
        const response = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          msgDiv.className = 'success-message';
          msgDiv.innerHTML = '✅ Contraseña actualizada. Redirigiendo...';
          setTimeout(() => window.location.href = 'index.html', 2000);
        } else {
          throw new Error(data.message);
        }
      } catch (error) {
        msgDiv.className = 'error-message';
        msgDiv.innerHTML = `❌ ${error.message}`;
        btn.innerHTML = 'CAMBIAR CONTRASEÑA →';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
