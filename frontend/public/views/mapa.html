<div class="section-title">
  <i class="fas fa-map-marker-alt"></i> Mapa de Incidentes Reportados
</div>

<!-- Controles del mapa -->
<div class="card" style="margin-bottom: 1rem; padding: 1rem;">
  <div style="display: flex; gap: 1rem; flex-wrap: wrap; align-items: center;">
    <div style="flex: 1;">
      <input type="text" id="mapSearchInput" 
             placeholder="Buscar ubicación en el mapa..." 
             style="width: 100%; padding: 8px 12px; background: var(--deep); border: 1px solid var(--edge); border-radius: 8px; color: var(--bright);">
    </div>
    <div>
      <button id="resetMapView" class="btn-outline btn-sm">
        <i class="fas fa-location-arrow"></i> Centrar mapa
      </button>
    </div>
    <div>
      <button id="toggleMarkers" class="btn-outline btn-sm">
        <i class="fas fa-layer-group"></i> Mostrar todos
      </button>
    </div>
  </div>
  
  <!-- Filtros por tipo de incidente -->
  <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem;">
    <button class="map-filter-chip active" data-type="all">Todos</button>
    <button class="map-filter-chip" data-type="Filtración de datos">🔓 Filtración</button>
    <button class="map-filter-chip" data-type="Acceso no autorizado">🚪 Acceso no autorizado</button>
    <button class="map-filter-chip" data-type="Suplantación de identidad">🎭 Suplantación</button>
    <button class="map-filter-chip" data-type="Pérdida de información">💾 Pérdida</button>
  </div>
</div>

<!-- Mapa -->
<div id="map" style="height: 450px; border-radius: 12px; margin-bottom: 1rem;"></div>

<!-- Leyenda -->
<div class="card" style="margin-bottom: 1rem; padding: 0.75rem;">
  <div style="display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; margin-bottom: 0.75rem;">
    <span><span style="display: inline-block; width: 12px; height: 12px; background: #ff4757; border-radius: 50%; margin-right: 5px;"></span> Filtración de datos</span>
    <span><span style="display: inline-block; width: 12px; height: 12px; background: #f5a623; border-radius: 50%; margin-right: 5px;"></span> Acceso no autorizado</span>
    <span><span style="display: inline-block; width: 12px; height: 12px; background: #f0a500; border-radius: 50%; margin-right: 5px;"></span> Pérdida de información</span>
    <span><span style="display: inline-block; width: 12px; height: 12px; background: #e74c3c; border-radius: 50%; margin-right: 5px;"></span> Suplantación de identidad</span>
    <span><span style="display: inline-block; width: 12px; height: 12px; background: #00e5c3; border-radius: 50%; margin-right: 5px;"></span> Otros</span>
  </div>
  <div style="border-top: 1px solid var(--edge); padding-top: 0.5rem; font-size: 0.75rem; color: var(--muted); text-align: center;">
    💡 <strong>Clustering:</strong> Haz zoom para expandir clusters de incidentes · Haz clic en un cluster para ver los incidentes individuales
  </div>
</div>

<!-- Lista de ubicaciones -->
<div class="card" style="padding: 0; overflow: hidden;">
  <div style="background: var(--deep); padding: 0.75rem 1rem; border-bottom: 1px solid var(--edge);">
    <strong><i class="fas fa-list"></i> Incidentes por ubicación</strong>
    <span id="incidentesCount" style="float: right; color: var(--cyan);">0 incidentes</span>
  </div>
  <div id="incidentesList" style="max-height: 300px; overflow-y: auto;"></div>
</div>

<style>
  .map-filter-chip {
    background: var(--deep);
    border: 1px solid var(--edge);
    color: var(--text2);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.7rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  
  .map-filter-chip:hover {
    border-color: var(--cyan);
    color: var(--cyan);
  }
  
  .map-filter-chip.active {
    background: var(--cyan);
    color: var(--ink);
    border-color: var(--cyan);
  }
  
  .custom-marker {
    background: transparent;
    border: none;
  }
  
  .marker-pulse {
    animation: pulse 1.5s ease-in-out infinite;
  }
  
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.3); opacity: 0.7; }
  }
  
  /* ========== Estilos de clusters personalizados ========== */
  .marker-cluster {
    background: linear-gradient(135deg, var(--cyan) 0%, #00d4aa 100%) !important;
    border: 2px solid rgba(255, 255, 255, 0.3) !important;
    border-radius: 50%;
    box-shadow: 0 0 12px rgba(0, 229, 195, 0.5), inset 0 0 8px rgba(255, 255, 255, 0.2) !important;
    transition: all 0.3s ease;
  }
  
  .marker-cluster:hover {
    background: linear-gradient(135deg, #00ffd9 0%, #00e5c3 100%) !important;
    box-shadow: 0 0 20px rgba(0, 229, 195, 0.8), inset 0 0 12px rgba(255, 255, 255, 0.3) !important;
    transform: scale(1.1);
  }
  
  .marker-cluster span {
    background: rgba(8, 15, 20, 0.9) !important;
    border-radius: 50%;
    font-weight: 700;
    font-size: 0.8rem;
    color: var(--cyan) !important;
    text-shadow: 0 0 4px rgba(0, 229, 195, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100% !important;
    height: 100% !important;
  }
  
  /* Clusters por nivel de zoom */
  .marker-cluster.marker-cluster-small {
    background: linear-gradient(135deg, #00c99e 0%, #009688 100%) !important;
  }
  
  .marker-cluster.marker-cluster-small:hover {
    background: linear-gradient(135deg, #00ffd9 0%, #00c99e 100%) !important;
  }
  
  .marker-cluster.marker-cluster-medium {
    background: linear-gradient(135deg, #00b8a0 0%, #00897b 100%) !important;
  }
  
  .marker-cluster.marker-cluster-medium:hover {
    background: linear-gradient(135deg, #1ee8ce 0%, #00b8a0 100%) !important;
  }
  
  .marker-cluster.marker-cluster-large {
    background: linear-gradient(135deg, #0097a7 0%, #00695c 100%) !important;
  }
  
  .marker-cluster.marker-cluster-large:hover {
    background: linear-gradient(135deg, #26c6da 0%, #0097a7 100%) !important;
  }
  
  /* Animación de expansión de spiderfied clusters */
  .leaflet-cluster-spider-leg {
    stroke: var(--cyan) !important;
    stroke-width: 2 !important;
    opacity: 0.8;
  }
  
  .leaflet-cluster-spider {
    stroke: var(--cyan) !important;
  }
  
  /* Tooltip del cluster */
  .leaflet-popup-content-wrapper {
    background: rgba(8, 15, 20, 0.95) !important;
    border: 1px solid var(--cyan) !important;
    border-radius: 8px;
    box-shadow: 0 0 16px rgba(0, 229, 195, 0.3);
  }
  
  .leaflet-popup-tip {
    background: rgba(8, 15, 20, 0.95) !important;
    border-color: var(--cyan) !important;
  }
  
  .leaflet-popup-content {
    color: var(--text1) !important;
  }
</style>

<script src="js/views/mapa.js" type="module"></script>
